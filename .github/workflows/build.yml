name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      # The android/ folder is intentionally not committed; CI regenerates it.
      # --empty skips the default counter-app scaffolding so it doesn't
      # collide with our own lib/main.dart and tests.
      - name: Regenerate platform files
        run: |
          flutter create . \
            --project-name smartqueue \
            --org com.groupalpha \
            --platforms=android \
            --empty

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/smartqueue-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartqueue-release-apk
          path: dist/smartqueue-release.apk
          if-no-files-found: error
          retention-days: 30
