name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # 3.27+ ships the new declarative Android Gradle plugin that
          # modern packages (app_links 6.x via supabase_flutter) require.
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      # The android/ folder is intentionally not committed; CI regenerates it.
      # --empty skips the default counter-app scaffolding so it doesn't
      # collide with our own lib/main.dart and tests.
      - name: Regenerate platform files
        run: |
          flutter create . \
            --project-name semestermate \
            --org com.groupalpha \
            --platforms=android \
            --empty

      # flutter_local_notifications needs POST_NOTIFICATIONS on Android 13+,
      # plus an internet permission for Supabase. We patch the manifest after
      # `flutter create` regenerates it.
      - name: Patch AndroidManifest for notifications + internet
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("android/app/src/main/AndroidManifest.xml")
          src = p.read_text()
          perms = (
              '    <uses-permission android:name="android.permission.INTERNET"/>\n'
              '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n'
              '    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM"/>\n'
              '    <uses-permission android:name="android.permission.USE_EXACT_ALARM"/>\n'
              '    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>\n'
              '    <uses-permission android:name="android.permission.VIBRATE"/>\n'
          )
          if "POST_NOTIFICATIONS" not in src:
              # Match <manifest ...> even if it spans multiple lines
              new_src, n = re.subn(
                  r'(<manifest\b[^>]*>\s*\n)',
                  r'\1' + perms,
                  src,
                  count=1,
                  flags=re.DOTALL,
              )
              if n == 0:
                  raise SystemExit("ERROR: could not find <manifest ...> tag to patch")
              p.write_text(new_src)
          print(p.read_text())
          PY

      # Patch android/app/build.gradle.kts to:
      #   - pin NDK 27.0.12077973 (app_links / shared_preferences_android need it)
      #   - enable core library desugaring (flutter_local_notifications needs it)
      #   - add desugar_jdk_libs dependency
      - name: Patch build.gradle.kts (NDK + desugaring)
        run: |
          python3 - <<'PY'
          import re, pathlib

          p = pathlib.Path("android/app/build.gradle.kts")
          src = p.read_text()

          # ---------- NDK version ----------
          ndk_line = 'ndkVersion = "27.0.12077973"'
          new_src, n = re.subn(r'ndkVersion\s*=\s*[^\n]+', ndk_line, src, count=1)
          if n == 0:
              new_src, n = re.subn(
                  r'(compileSdk\s*=\s*[^\n]+\n)',
                  r'\1    ' + ndk_line + '\n',
                  src, count=1,
              )
          if n == 0:
              raise SystemExit("ERROR: could not patch ndkVersion")
          src = new_src

          # ---------- core library desugaring ----------
          if "isCoreLibraryDesugaringEnabled" not in src:
              if re.search(r'compileOptions\s*\{', src):
                  src = re.sub(
                      r'(compileOptions\s*\{)',
                      r'\1\n        isCoreLibraryDesugaringEnabled = true',
                      src, count=1,
                  )
              else:
                  src = re.sub(
                      r'(android\s*\{)',
                      (
                          r'\1\n'
                          '    compileOptions {\n'
                          '        isCoreLibraryDesugaringEnabled = true\n'
                          '        sourceCompatibility = JavaVersion.VERSION_11\n'
                          '        targetCompatibility = JavaVersion.VERSION_11\n'
                          '    }'
                      ),
                      src, count=1,
                  )

          # ---------- coreLibraryDesugaring dependency ----------
          if "desugar_jdk_libs" not in src:
              dep_line = 'coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")'
              if re.search(r'\bdependencies\s*\{', src):
                  src = re.sub(
                      r'(dependencies\s*\{)',
                      r'\1\n    ' + dep_line,
                      src, count=1,
                  )
              else:
                  src += '\n\ndependencies {\n    ' + dep_line + '\n}\n'

          p.write_text(src)
          print(src)
          PY

      - name: Install dependencies
        run: flutter pub get

      # Render the SVG icons to PNG so flutter_launcher_icons can consume them.
      # librsvg2-bin is small (~1MB) and faster than ImageMagick for SVG.
      - name: Install librsvg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends librsvg2-bin

      - name: Render launcher icons (SVG -> PNG)
        run: |
          rsvg-convert -w 1024 -h 1024 assets/icon/icon.svg -o assets/icon/icon.png
          rsvg-convert -w 1024 -h 1024 assets/icon/icon_foreground.svg -o assets/icon/icon_foreground.png
          ls -lh assets/icon/

      - name: Generate Android launcher icons
        run: dart run flutter_launcher_icons

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build release APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/semestermate-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: semestermate-release-apk
          path: dist/semestermate-release.apk
          if-no-files-found: error
          retention-days: 30
