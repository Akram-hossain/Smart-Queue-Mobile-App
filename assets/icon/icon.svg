<?xml version="1.0" encoding="UTF-8"?>
<!--
  SemesterMate launcher icon (legacy / full).
  1024x1024 — gradient background + white "school" glyph (Material Symbols).
  Used as image_path in pubspec flutter_launcher_icons config.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
  </defs>

  <!-- Background tile (Android will round-mask this for legacy icons). -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Subtle highlight ring for depth -->
  <circle cx="512" cy="512" r="430"
          fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <!-- Material "school" glyph, scaled to ~520px, centered. -->
  <g transform="translate(252, 252) scale(21.67)" fill="white">
    <path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/>
  </g>
</svg>
