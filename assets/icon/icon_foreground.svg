<?xml version="1.0" encoding="UTF-8"?>
<!--
  Adaptive-icon foreground layer for Android 8+.
  Transparent background; the launcher mixes this on top of
  `adaptive_icon_background` (a solid colour declared in pubspec).
  The glyph is kept inside Android's "safe zone" (inner 66% of the
  1024x1024 canvas) so circular / rounded-square masks never clip it.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <g transform="translate(320, 320) scale(16.0)" fill="white">
    <path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/>
  </g>
</svg>
