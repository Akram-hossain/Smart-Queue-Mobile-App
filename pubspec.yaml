name: semestermate
description: SemesterMate — a premium student productivity & academic management app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.6.2

  # Backend
  supabase_flutter: ^2.8.0

  # Local notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Charts & calendar
  fl_chart: ^0.69.0
  table_calendar: ^3.1.2

  # Storage & utilities
  shared_preferences: ^2.3.2
  intl: ^0.19.0

  # UI polish
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_lints: ^4.0.0
  # Generates Android launcher icons from a single source PNG.
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

# Run via:  dart run flutter_launcher_icons
# The PNGs at image_path / adaptive_icon_foreground are generated by CI
# from assets/icon/*.svg using rsvg-convert (see .github/workflows/build.yml).
flutter_launcher_icons:
  # `true` overwrites the default ic_launcher.png in every mipmap density,
  # so notifications (which reference @mipmap/ic_launcher) also show the
  # new artwork — no AndroidManifest changes needed.
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#4338CA"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
